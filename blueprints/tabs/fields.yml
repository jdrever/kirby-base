label: Fields
icon: edit-line
columns:
  main:
    width: 1/1
    sections:
      desc:
        type: fields
        fields:
          description:
            type: textarea
            buttons: false
          keywords:
            type: textarea
            buttons: false
      search:
        type: fields
        fields:
          key_search_phrases:
            label: Key search phrases
            type: textarea
            buttons: false
            help: >
              One phrase per line. A search query that exactly matches any phrase
              here will rank this page first in results, overriding all other
              relevance signals.
      og-info:
        type: info
        label: " "
        text: |
          The fields below relate to Open Graph data, which determines how a page will
          be displayed when linked to via social media
      og:
        type: fields
        fields:
          og_title:
            label: Open Graph Title
            type: text
          og_description:
            label: Open Graph Description
            type: textarea
          og_image:
            label: Open Graph Image
            type: files
            multiple: false
