name: Form Likert Scale
icon: star

fields:
  label:
    type: text
    label: Question label
    required: true
  name:
    type: text
    label: Field name (no spaces, use_underscores)
    required: true
    help: Used as the POST key and column header in CSV exports. Must be unique within the form.
  leftLabel:
    type: text
    label: Left label
    placeholder: Strongly disagree
  middleLabel:
    type: text
    label: Middle label
    placeholder: Neutral
  rightLabel:
    type: text
    label: Right label
    placeholder: Strongly agree
