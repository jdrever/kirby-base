name: Form Checkbox Group
icon: list-bullet

fields:
  label:
    type: text
    label: Question label
    required: true
  name:
    type: text
    label: Field name (no spaces, use_underscores)
    required: true
    help: Used as the POST key and column header in CSV exports. Must be unique within the form.
  options:
    type: textarea
    label: Options (one per line)
    required: true
  required:
    type: toggle
    label: Required
    default: false
  help:
    type: text
    label: Help text
