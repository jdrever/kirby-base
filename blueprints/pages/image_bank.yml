title: Image Bank
icon: image

options:
  changeTitle: false
  changeStatus: false
  duplicate: false
  delete: false

tabs:
  images:
    label: Images
    icon: image
    columns:
      - width: 1/4
        sections:
          info:
            type: info
            headline: About the Image Bank
            text: >
              The Image Bank allows you to upload and manage images
              that can be reused across the site. Tag your images
              to make them easier to find.

          tags:
            type: fields
            fields:
              tagList:
                label: Tag List
                type: structure
                max: 30
                fields:
                  tag:
                    label: Tag Name
                    type: text

      - width: 3/4
        sections:
          allImages:
            type: filteredfiles
            headline: All images
            search: true
            pageSize: 50
            sortBy: filename asc
            sortOptions:
              - field: filename
                label: Filename
              - field: photographer
                label: Photographer
            filters:
              photographer:
                label: Photographer
                type: distinctText
              tags:
                label: Tag
                type: tags
              taxa:
                label: Taxon
                type: pages
                collection: uncachedTaxa
            columns:
              - field: filename
                label: Filename
                width: 1/3
              - field: photographer
                label: Photographer
                width: 1/3
              - field: tags
                label: Tags
                width: 1/3
