title: File Link

icon: file-code
image:
  color: green


tabs:
  linkTab:
    label: Link
    fields:
      file:
        type: files
        label: Upload or select a file
        max: 1
        required: true
        uploads: true
        help: Upload a new file or select from the current page or the file archive.
        query: site.find("file-archive").files
      permanentLink:
        type: info
        label: Permanent link
        text: "{{ page.url }}"
        help: Share this page URL rather than the file link — it is friendlier and will not break if the file is replaced.
  panelTab:
    extends: tabs/panel
    columns:
      main:
        fields:
          showSubPageImages: false
